<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pool Co.">
<meta name="theme-color" content="#0c1a2e">
<title>Pool Co.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

:root {
  --bg: #0c1a2e;
  --bg2: #112240;
  --bg3: #1a2f50;
  --card: #162035;
  --card2: #1e2d4a;
  --border: rgba(255,255,255,0.08);
  --pool: #38bdf8;
  --pool2: #0ea5e9;
  --pool-dim: rgba(56,189,248,0.12);
  --green: #34d399;
  --green-dim: rgba(52,211,153,0.12);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.12);
  --amber: #fbbf24;
  --amber-dim: rgba(251,191,36,0.12);
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #475569;
  --mono: 'DM Mono', monospace;
  --sans: 'Nunito', sans-serif;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html { height: 100%; background: var(--bg); }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100%;
  max-width: 430px;
  margin: 0 auto;
  position: relative;
  overflow-x: hidden;
}

/* ── HEADER ── */
.app-header {
  background: var(--bg2);
  padding: calc(var(--safe-top) + 14px) 20px 14px;
  position: sticky;
  top: 0;
  z-index: 50;
  border-bottom: 1px solid var(--border);
}
.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.app-title {
  font-size: 22px;
  font-weight: 900;
  color: var(--pool);
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.wave-icon {
  width: 28px; height: 28px;
  background: var(--pool-dim);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.month-selector {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--bg3);
  border-radius: 10px;
  padding: 6px 10px;
}
.month-selector button {
  background: none; border: none; color: var(--text2);
  font-size: 18px; cursor: pointer; padding: 0 2px;
  line-height: 1;
}
.month-selector span {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  font-weight: 500;
  min-width: 80px;
  text-align: center;
}

/* ── NAV ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 8px 0 calc(var(--safe-bottom) + 8px);
  z-index: 50;
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 0;
}
.nav-icon {
  font-size: 22px;
  line-height: 1;
  transition: transform 0.15s;
}
.nav-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  letter-spacing: 0.3px;
  text-transform: uppercase;
}
.nav-btn.active .nav-icon { transform: scale(1.12); }
.nav-btn.active .nav-label { color: var(--pool); }

/* ── CONTENT ── */
.content {
  padding: 16px 16px calc(var(--safe-bottom) + 90px);
  min-height: 100vh;
}

/* ── PANELS ── */
.panel { display: none; }
.panel.active { display: block; }

/* ── STATS ROW ── */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 18px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
}
.stat-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 6px;
}
.stat-value {
  font-size: 24px;
  font-weight: 900;
  letter-spacing: -1px;
  line-height: 1;
}
.stat-sub {
  font-size: 11px;
  color: var(--text3);
  margin-top: 4px;
  font-weight: 600;
}
.stat-card.wide {
  grid-column: span 2;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.profit-bar-wrap { flex: 1; margin-left: 14px; }
.profit-bar {
  height: 6px;
  background: var(--bg3);
  border-radius: 99px;
  overflow: hidden;
  margin-top: 6px;
}
.profit-fill {
  height: 100%;
  border-radius: 99px;
  background: var(--green);
  transition: width 0.5s ease;
}

/* ── SECTION ── */
.section-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  margin-top: 4px;
}
.section-title {
  font-size: 13px;
  font-weight: 800;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.section-count {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
}

/* ── PAYMENT ROWS (Reminders style) ── */
.payment-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }

.payment-row {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: all 0.2s;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}
.payment-row.paid {
  background: var(--green-dim);
  border-color: rgba(52,211,153,0.2);
}
.payment-row:active { transform: scale(0.98); }

.check-circle {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 2px solid var(--text3);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
}
.payment-row.paid .check-circle {
  background: var(--green);
  border-color: var(--green);
  transform: scale(1.05);
}
.check-circle svg {
  width: 14px; height: 14px;
  stroke: #0c1a2e;
  stroke-width: 2.5;
  stroke-linecap: round;
  stroke-linejoin: round;
  fill: none;
  opacity: 0;
  transform: scale(0.5);
  transition: all 0.2s 0.05s;
}
.payment-row.paid .check-circle svg {
  opacity: 1;
  transform: scale(1);
}

.payment-info { flex: 1; min-width: 0; }
.payment-name {
  font-size: 15px;
  font-weight: 800;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.payment-row.paid .payment-name { color: var(--green); }
.payment-addr {
  font-size: 12px;
  color: var(--text3);
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
}
.payment-amount {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  flex-shrink: 0;
}
.payment-row.paid .payment-amount { color: var(--green); }

/* ── EXPENSE ROWS ── */
.expense-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
.expense-row {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 13px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.exp-cat-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.exp-info { flex: 1; min-width: 0; }
.exp-desc {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.exp-cat {
  font-size: 11px;
  color: var(--text3);
  font-family: var(--mono);
  margin-top: 2px;
}
.exp-amount {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 500;
  color: var(--amber);
  flex-shrink: 0;
}
.exp-delete {
  background: none; border: none;
  color: var(--text3); font-size: 18px;
  cursor: pointer; padding: 0 0 0 6px;
  line-height: 1;
  flex-shrink: 0;
}
.exp-delete:active { color: var(--red); }

/* ── CAT BADGES ── */
.cat-colors { Chemicals: '#38bdf8', Equipment: '#34d399', Vehicle: '#fbbf24', Labor: '#a78bfa', Other: '#f87171' }

/* ── BUTTON ── */
.fab {
  position: fixed;
  bottom: calc(var(--safe-bottom) + 80px);
  right: 20px;
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--pool);
  border: none;
  color: #0c1a2e;
  font-size: 26px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(56,189,248,0.4);
  display: flex; align-items: center; justify-content: center;
  z-index: 40;
  transition: transform 0.15s, box-shadow 0.15s;
}
.fab:active { transform: scale(0.93); box-shadow: 0 2px 10px rgba(56,189,248,0.3); }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px 18px;
  border-radius: 10px; border: none;
  font-family: var(--sans); font-size: 14px; font-weight: 800;
  cursor: pointer; transition: all 0.12s;
}
.btn-primary { background: var(--pool); color: #0c1a2e; }
.btn-primary:active { background: var(--pool2); }
.btn-ghost { background: var(--bg3); color: var(--text2); }
.btn-ghost:active { background: var(--card2); }
.btn-block { width: 100%; }
.btn-danger { background: var(--red-dim); color: var(--red); }

/* ── BOTTOM SHEET ── */
.sheet-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.sheet-overlay.open { opacity: 1; pointer-events: all; }
.sheet {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%) translateY(100%);
  width: 100%; max-width: 430px;
  background: var(--bg2);
  border-radius: 20px 20px 0 0;
  padding: 0 20px calc(var(--safe-bottom) + 20px);
  z-index: 101;
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  max-height: 92vh;
  overflow-y: auto;
}
.sheet-overlay.open .sheet {
  transform: translateX(-50%) translateY(0);
}
.sheet-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 99px;
  margin: 12px auto 20px;
}
.sheet-title { font-size: 18px; font-weight: 900; margin-bottom: 20px; }
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block;
  font-size: 12px; font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.form-group input, .form-group select {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  outline: none;
  -webkit-appearance: none;
  appearance: none;
}
.form-group input:focus, .form-group select:focus {
  border-color: var(--pool);
}
.form-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.sheet-actions { display: flex; gap: 10px; margin-top: 20px; }
.sheet-actions .btn { flex: 1; }

/* ── CLIENTS PANEL ── */
.client-row {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}
.client-avatar {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: var(--pool-dim);
  color: var(--pool);
  font-size: 16px; font-weight: 900;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.client-info { flex: 1; min-width: 0; }
.client-name { font-size: 15px; font-weight: 800; }
.client-addr { font-size: 12px; color: var(--text3); font-weight: 600; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.client-rate { font-family: var(--mono); font-size: 14px; color: var(--pool); font-weight: 500; flex-shrink: 0; }
.client-del { background: none; border: none; color: var(--text3); font-size: 20px; cursor: pointer; padding: 0 0 0 8px; }
.client-del:active { color: var(--red); }

/* ── EMPTY ── */
.empty {
  text-align: center;
  padding: 32px 20px;
  color: var(--text3);
}
.empty-icon { font-size: 36px; margin-bottom: 10px; }
.empty-text { font-size: 14px; font-weight: 700; }
.empty-sub { font-size: 12px; margin-top: 4px; }

/* ── HISTORY ── */
.history-month {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 10px;
  cursor: pointer;
}
.history-month-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.history-month-name { font-size: 15px; font-weight: 800; }
.history-month-stats { display: flex; gap: 12px; margin-top: 10px; }
.h-stat { flex: 1; }
.h-stat-label { font-family: var(--mono); font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; }
.h-stat-val { font-size: 16px; font-weight: 900; margin-top: 2px; }
.history-detail { display: none; margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; }
.history-month.expanded .history-detail { display: block; }
.h-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
.h-row:last-child { border-bottom: none; }

/* ── OVERDUE BADGE ── */
.overdue-badge {
  display: inline-block;
  padding: 2px 8px;
  background: var(--red-dim);
  color: var(--red);
  border-radius: 99px;
  font-size: 10px;
  font-weight: 700;
  font-family: var(--mono);
  margin-left: 6px;
}

/* ── INSTALL BANNER ── */
.install-banner {
  background: var(--pool-dim);
  border: 1px solid rgba(56,189,248,0.25);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.install-banner-text { flex: 1; font-size: 13px; font-weight: 700; color: var(--pool); }
.install-banner-sub { font-size: 11px; font-weight: 600; color: var(--text2); margin-top: 2px; }
.install-close { background: none; border: none; color: var(--text3); font-size: 20px; cursor: pointer; }

/* ── ANIMATIONS ── */
@keyframes pop-in {
  from { opacity: 0; transform: scale(0.94) translateY(8px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.panel.active { animation: pop-in 0.2s ease; }
</style>
</head>
<body>

<div class="app-header">
  <div class="header-row">
    <div class="app-title">
      <div class="wave-icon">🌊</div>
      Pool Co.
    </div>
    <div class="month-selector">
      <button onclick="changeMonth(-1)">‹</button>
      <span id="month-label"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
  </div>
</div>

<div class="content">

  <!-- PAYMENTS PANEL -->
  <div class="panel active" id="panel-payments">
    <div id="install-hint"></div>
    <div class="stats-row" id="payment-stats"></div>

    <div class="section-hd">
      <div class="section-title">Unpaid</div>
      <div class="section-count" id="unpaid-count"></div>
    </div>
    <div class="payment-list" id="unpaid-list"></div>

    <div class="section-hd" style="margin-top:6px">
      <div class="section-title" style="color:var(--green)">Paid ✓</div>
      <div class="section-count" id="paid-count"></div>
    </div>
    <div class="payment-list" id="paid-list"></div>
  </div>

  <!-- EXPENSES PANEL -->
  <div class="panel" id="panel-expenses">
    <div class="stats-row" id="expense-stats"></div>
    <div class="section-hd">
      <div class="section-title">This month</div>
      <div class="section-count" id="exp-count"></div>
    </div>
    <div class="expense-list" id="expense-list"></div>
  </div>

  <!-- CLIENTS PANEL -->
  <div class="panel" id="panel-clients">
    <div class="section-hd">
      <div class="section-title">All clients</div>
      <div class="section-count" id="client-count"></div>
    </div>
    <div id="client-list"></div>
  </div>

  <!-- HISTORY PANEL -->
  <div class="panel" id="panel-history">
    <div class="section-hd">
      <div class="section-title">Past months</div>
    </div>
    <div id="history-list"></div>
  </div>

</div>

<!-- FAB -->
<button class="fab" id="fab-btn" onclick="openFab()">+</button>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="switchTab('payments',this)">
    <div class="nav-icon">✓</div>
    <div class="nav-label">Payments</div>
  </button>
  <button class="nav-btn" onclick="switchTab('expenses',this)">
    <div class="nav-icon">💸</div>
    <div class="nav-label">Expenses</div>
  </button>
  <button class="nav-btn" onclick="switchTab('clients',this)">
    <div class="nav-icon">👥</div>
    <div class="nav-label">Clients</div>
  </button>
  <button class="nav-btn" onclick="switchTab('history',this)">
    <div class="nav-icon">📅</div>
    <div class="nav-label">History</div>
  </button>
</nav>

<!-- BOTTOM SHEET -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheet-title"></div>
    <div id="sheet-body"></div>
    <div class="sheet-actions" id="sheet-actions"></div>
  </div>
</div>

<script>
// ── STORAGE ──────────────────────────────────────────────────────────
const S = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)) } catch { return null } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
};

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const CAT_COLORS = { Chemicals:'#38bdf8', Equipment:'#34d399', Vehicle:'#fbbf24', Labor:'#a78bfa', Tools:'#fb923c', Other:'#f87171' };
const CATS = Object.keys(CAT_COLORS);

// ── STATE ────────────────────────────────────────────────────────────
let clients = S.get('pc2_clients') || [];
let monthData = S.get('pc2_months') || {};  // { "2025-06": { payments: {clientId: bool}, expenses: [...] } }

let viewYear = new Date().getFullYear();
let viewMonth = new Date().getMonth();
let currentTab = 'payments';
let currentSheet = null;

function monthKey(y, m) { return `${y}-${String(m+1).padStart(2,'0')}`; }
function currentKey() { return monthKey(viewYear, viewMonth); }

function getMonthData(key) {
  if (!monthData[key]) monthData[key] = { payments: {}, expenses: [] };
  return monthData[key];
}

function save() {
  S.set('pc2_clients', clients);
  S.set('pc2_months', monthData);
}

// ── TABS ─────────────────────────────────────────────────────────────
function switchTab(name, el) {
  currentTab = name;
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  if (el) el.classList.add('active');
  // hide FAB on history
  document.getElementById('fab-btn').style.display = name === 'history' ? 'none' : 'flex';
  render();
}

function changeMonth(dir) {
  viewMonth += dir;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  document.getElementById('month-label').textContent = MONTHS[viewMonth].slice(0,3) + ' ' + viewYear;
  render();
}

// ── RENDER ───────────────────────────────────────────────────────────
function render() {
  renderPayments();
  renderExpenses();
  renderClients();
  renderHistory();
}

function fmt$(n) { return '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }

function renderPayments() {
  const key = currentKey();
  const md = getMonthData(key);

  const totalRevenue = clients.reduce((s, c) => s + Number(c.rate), 0);
  const paid = clients.filter(c => md.payments[c.id]);
  const unpaid = clients.filter(c => !md.payments[c.id]);
  const paidAmount = paid.reduce((s, c) => s + Number(c.rate), 0);

  document.getElementById('payment-stats').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Collected</div>
      <div class="stat-value" style="color:var(--green)">${fmt$(paidAmount)}</div>
      <div class="stat-sub">${paid.length} of ${clients.length} clients</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Outstanding</div>
      <div class="stat-value" style="color:var(--red)">${fmt$(totalRevenue - paidAmount)}</div>
      <div class="stat-sub">${unpaid.length} unpaid</div>
    </div>
  `;

  document.getElementById('unpaid-count').textContent = unpaid.length + ' remaining';
  document.getElementById('paid-count').textContent = paid.length + ' clients';

  document.getElementById('unpaid-list').innerHTML = unpaid.length ? unpaid.map(c => paymentRow(c, false)).join('') :
    `<div class="empty"><div class="empty-icon">🎉</div><div class="empty-text">All paid!</div><div class="empty-sub">Everyone is paid up this month.</div></div>`;

  document.getElementById('paid-list').innerHTML = paid.length ? paid.map(c => paymentRow(c, true)).join('') :
    `<div style="color:var(--text3);font-size:13px;font-weight:700;padding:6px 0 10px">None yet</div>`;
}

function paymentRow(c, isPaid) {
  return `<div class="payment-row ${isPaid ? 'paid' : ''}" onclick="togglePayment('${c.id}')">
    <div class="check-circle">
      <svg viewBox="0 0 14 14"><polyline points="2,7 6,11 12,3"/></svg>
    </div>
    <div class="payment-info">
      <div class="payment-name">${esc(c.name)}</div>
      <div class="payment-addr">${esc(c.address)}</div>
    </div>
    <div class="payment-amount">${fmt$(c.rate)}</div>
  </div>`;
}

function renderExpenses() {
  const key = currentKey();
  const md = getMonthData(key);
  const exps = md.expenses || [];

  const totalExp = exps.reduce((s, e) => s + Number(e.amount), 0);
  const paidRevenue = clients.filter(c => md.payments[c.id]).reduce((s, c) => s + Number(c.rate), 0);
  const pct = paidRevenue > 0 ? Math.round(totalExp / paidRevenue * 100) : 0;
  const profit = paidRevenue - totalExp;

  document.getElementById('expense-stats').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Total expenses</div>
      <div class="stat-value" style="color:var(--amber)">${fmt$(totalExp)}</div>
      <div class="stat-sub">${exps.length} items</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Net profit</div>
      <div class="stat-value" style="color:var(--green)">${fmt$(profit)}</div>
      <div class="stat-sub">${pct}% went to expenses</div>
    </div>
    <div class="stat-card wide">
      <div>
        <div class="stat-label">Expense ratio</div>
        <div class="stat-value" style="color:${pct > 50 ? 'var(--red)' : pct > 30 ? 'var(--amber)' : 'var(--green)'}">${pct}%</div>
      </div>
      <div class="profit-bar-wrap">
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);font-family:var(--mono)">
          <span>of revenue → expenses</span><span>${fmt$(paidRevenue)} rev.</span>
        </div>
        <div class="profit-bar">
          <div class="profit-fill" style="width:${Math.min(pct,100)}%;background:${pct>50?'var(--red)':pct>30?'var(--amber)':'var(--green)'}"></div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('exp-count').textContent = exps.length;
  document.getElementById('expense-list').innerHTML = exps.length ? exps.map((e,i) => `
    <div class="expense-row">
      <div class="exp-cat-dot" style="background:${CAT_COLORS[e.category]||'#94a3b8'}"></div>
      <div class="exp-info">
        <div class="exp-desc">${esc(e.desc)}</div>
        <div class="exp-cat">${e.category} · ${e.date}</div>
      </div>
      <div class="exp-amount">${fmt$(e.amount)}</div>
      <button class="exp-delete" onclick="deleteExpense('${key}',${i})">×</button>
    </div>
  `).join('') : `<div class="empty"><div class="empty-icon">💸</div><div class="empty-text">No expenses logged</div><div class="empty-sub">Tap + to add one</div></div>`;
}

function renderClients() {
  document.getElementById('client-count').textContent = clients.length;
  document.getElementById('client-list').innerHTML = clients.length ? clients.map(c => `
    <div class="client-row">
      <div class="client-avatar">${esc(c.name).charAt(0).toUpperCase()}</div>
      <div class="client-info">
        <div class="client-name">${esc(c.name)}</div>
        <div class="client-addr">${esc(c.address)}</div>
      </div>
      <div class="client-rate">${fmt$(c.rate)}/mo</div>
      <button class="client-del" onclick="deleteClient('${c.id}')">×</button>
    </div>
  `).join('') : `<div class="empty"><div class="empty-icon">👥</div><div class="empty-text">No clients yet</div><div class="empty-sub">Tap + to add your first client</div></div>`;
}

function renderHistory() {
  const keys = Object.keys(monthData).sort().reverse();
  const currentK = currentKey();

  if (!keys.length) {
    document.getElementById('history-list').innerHTML = `<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">No history yet</div><div class="empty-sub">Data from each month will appear here</div></div>`;
    return;
  }

  document.getElementById('history-list').innerHTML = keys.map(k => {
    const md = monthData[k];
    const [y, m] = k.split('-').map(Number);
    const monthName = MONTHS[m-1] + ' ' + y;
    const paidClients = clients.filter(c => md.payments && md.payments[c.id]);
    const paidRev = paidClients.reduce((s, c) => s + Number(c.rate), 0);
    const totalExp = (md.expenses || []).reduce((s, e) => s + Number(e.amount), 0);
    const profit = paidRev - totalExp;
    const totalRev = clients.reduce((s, c) => s + Number(c.rate), 0);

    const isCurrent = k === currentK;
    return `<div class="history-month" onclick="toggleHistory(this)">
      <div class="history-month-hd">
        <div class="history-month-name">${monthName}${isCurrent ? ' <span style="font-size:11px;color:var(--pool);font-family:var(--mono)">current</span>' : ''}</div>
        <div style="font-family:var(--mono);font-size:12px;color:var(--text3)">▸</div>
      </div>
      <div class="history-month-stats">
        <div class="h-stat">
          <div class="h-stat-label">Revenue</div>
          <div class="h-stat-val" style="color:var(--green)">${fmt$(paidRev)}</div>
        </div>
        <div class="h-stat">
          <div class="h-stat-label">Expenses</div>
          <div class="h-stat-val" style="color:var(--amber)">${fmt$(totalExp)}</div>
        </div>
        <div class="h-stat">
          <div class="h-stat-label">Profit</div>
          <div class="h-stat-val" style="color:${profit>=0?'var(--green)':'var(--red)'}">${fmt$(profit)}</div>
        </div>
      </div>
      <div class="history-detail">
        <div style="font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Payments (${paidClients.length}/${clients.length})</div>
        ${clients.map(c => `<div class="h-row"><span>${esc(c.name)}</span><span style="color:${md.payments&&md.payments[c.id]?'var(--green)':'var(--red)'};font-family:var(--mono);font-size:12px">${md.payments&&md.payments[c.id]?'✓ '+fmt$(c.rate):'unpaid'}</span></div>`).join('')}
        ${(md.expenses||[]).length ? `<div style="font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin:10px 0 8px">Expenses</div>
        ${(md.expenses||[]).map(e=>`<div class="h-row"><span>${esc(e.desc)}</span><span style="color:var(--amber);font-family:var(--mono);font-size:12px">${fmt$(e.amount)}</span></div>`).join('')}` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── ACTIONS ──────────────────────────────────────────────────────────
function togglePayment(clientId) {
  const key = currentKey();
  const md = getMonthData(key);
  md.payments[clientId] = !md.payments[clientId];
  save();
  renderPayments();
  renderExpenses();
  renderHistory();
}

function deleteExpense(key, idx) {
  monthData[key].expenses.splice(idx, 1);
  save();
  renderExpenses();
  renderHistory();
}

function deleteClient(id) {
  if (!confirm('Remove this client?')) return;
  clients = clients.filter(c => c.id !== id);
  save();
  renderClients();
  renderPayments();
}

function toggleHistory(el) {
  el.classList.toggle('expanded');
  const arrow = el.querySelector('.history-month-hd div:last-child');
  if (arrow) arrow.textContent = el.classList.contains('expanded') ? '▾' : '▸';
}

// ── FAB ──────────────────────────────────────────────────────────────
function openFab() {
  if (currentTab === 'payments' || currentTab === 'clients') openSheet('client');
  else if (currentTab === 'expenses') openSheet('expense');
}

// ── SHEETS ───────────────────────────────────────────────────────────
function openSheet(type) {
  currentSheet = type;
  const overlay = document.getElementById('sheet-overlay');
  const title = document.getElementById('sheet-title');
  const body = document.getElementById('sheet-body');
  const actions = document.getElementById('sheet-actions');

  if (type === 'client') {
    title.textContent = 'Add client';
    body.innerHTML = `
      <div class="form-group"><label>Full name</label><input id="f-name" placeholder="e.g. Martinez Family" autocomplete="off"></div>
      <div class="form-group"><label>Address</label><input id="f-addr" placeholder="123 Pool Lane, Jacksonville" autocomplete="off"></div>
      <div class="form-group"><label>Monthly rate ($)</label><input id="f-rate" type="number" inputmode="decimal" placeholder="150.00"></div>
    `;
    actions.innerHTML = `
      <button class="btn btn-ghost" onclick="closeSheet()">Cancel</button>
      <button class="btn btn-primary" onclick="saveClient()">Add Client</button>
    `;
  } else if (type === 'expense') {
    const today = new Date().toISOString().split('T')[0];
    title.textContent = 'Add expense';
    body.innerHTML = `
      <div class="form-group"><label>Description</label><input id="f-desc" placeholder="e.g. Chlorine tablets 50lb" autocomplete="off"></div>
      <div class="form-2col">
        <div class="form-group"><label>Category</label><select id="f-cat">${CATS.map(c=>`<option>${c}</option>`).join('')}</select></div>
        <div class="form-group"><label>Date</label><input id="f-date" type="date" value="${today}"></div>
      </div>
      <div class="form-group"><label>Amount ($)</label><input id="f-amount" type="number" inputmode="decimal" placeholder="0.00"></div>
    `;
    actions.innerHTML = `
      <button class="btn btn-ghost" onclick="closeSheet()">Cancel</button>
      <button class="btn btn-primary" onclick="saveExpense()">Add Expense</button>
    `;
  }

  overlay.classList.add('open');
  setTimeout(() => {
    const first = body.querySelector('input');
    if (first) first.focus();
  }, 350);
}

function closeSheet(e) {
  if (e && e.target !== document.getElementById('sheet-overlay')) return;
  document.getElementById('sheet-overlay').classList.remove('open');
  currentSheet = null;
}

function saveClient() {
  const name = document.getElementById('f-name').value.trim();
  const addr = document.getElementById('f-addr').value.trim();
  const rate = parseFloat(document.getElementById('f-rate').value);
  if (!name || !rate) { alert('Name and monthly rate are required.'); return; }
  clients.push({ id: 'c' + Date.now(), name, address: addr || '', rate });
  save();
  document.getElementById('sheet-overlay').classList.remove('open');
  currentSheet = null;
  render();
}

function saveExpense() {
  const desc = document.getElementById('f-desc').value.trim();
  const category = document.getElementById('f-cat').value;
  const date = document.getElementById('f-date').value;
  const amount = parseFloat(document.getElementById('f-amount').value);
  if (!desc || !amount) { alert('Description and amount are required.'); return; }
  const key = currentKey();
  const md = getMonthData(key);
  md.expenses.push({ desc, category, date, amount });
  save();
  document.getElementById('sheet-overlay').classList.remove('open');
  currentSheet = null;
  renderExpenses();
  renderHistory();
}

// ── INSTALL HINT ─────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showInstallHint() {
  const dismissed = S.get('pc2_install_dismissed');
  const isIOS = /iphone|ipad/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone;
  if (dismissed || isStandalone || !isIOS) return;
  document.getElementById('install-hint').innerHTML = `
    <div class="install-banner">
      <div>📲</div>
      <div class="install-banner-text">
        Install as iPhone app
        <div class="install-banner-sub">Tap Share → "Add to Home Screen"</div>
      </div>
      <button class="install-close" onclick="dismissInstall()">×</button>
    </div>
  `;
}
function dismissInstall() {
  S.set('pc2_install_dismissed', true);
  document.getElementById('install-hint').innerHTML = '';
}

// ── SEED DEMO DATA ───────────────────────────────────────────────────
function seedDemo() {
  if (clients.length) return;
  clients = [
    { id: 'c1', name: 'Martinez Family', address: '1240 Bayview Dr', rate: 150 },
    { id: 'c2', name: 'The Hendersons', address: '87 Coral Ridge Ct', rate: 175 },
    { id: 'c3', name: 'Sunrise Rentals', address: '400 Palm Ave', rate: 220 },
    { id: 'c4', name: 'Kim Nguyen', address: '33 Lakeview Blvd', rate: 140 },
  ];
  const key = currentKey();
  const md = getMonthData(key);
  md.payments['c1'] = true;
  md.payments['c3'] = true;
  md.expenses = [
    { desc: 'Chlorine tablets 50lb', category: 'Chemicals', date: new Date().toISOString().split('T')[0], amount: 89 },
    { desc: 'Fuel', category: 'Vehicle', date: new Date().toISOString().split('T')[0], amount: 65 },
  ];
  save();
}

// ── INIT ─────────────────────────────────────────────────────────────
seedDemo();
document.getElementById('month-label').textContent = MONTHS[viewMonth].slice(0,3) + ' ' + viewYear;
showInstallHint();
render();
</script>
</body>
